<style>
:root{--navy:#003D6B;--wine:#A4001B;--navy-light:#0A5A8C;--navy-pale:#E8F0F6;--wine-light:#C4233B;--wine-pale:#FCEDEF;--gray-900:#1a1a1a;--gray-700:#444;--gray-500:#777;--gray-300:#bbb;--gray-100:#f2f3f5;--white:#fff;--green:#1B8C4F;--orange:#D4760A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--gray-100);color:var(--gray-900);font-size:13px}
.header{background:var(--navy);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700;color:var(--white);letter-spacing:.3px}
.header .date{font-size:11px;color:rgba(255,255,255,.7)}
.filters{background:var(--white);padding:8px 24px;display:flex;gap:28px;border-bottom:1px solid #dde3e8;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px}
.filter-group button{padding:4px 14px;border:1px solid #cdd5dc;background:var(--white);border-radius:4px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--gray-700)}
.filter-group button.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.filter-group button:hover:not(.active){background:var(--navy-pale);border-color:var(--navy-light)}
.tabs{background:var(--white);padding:0 24px;display:flex;gap:0;border-bottom:1px solid #dde3e8}
.tab{padding:10px 22px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--gray-500);transition:all .15s}
.tab.active{color:var(--navy);border-bottom-color:var(--wine)}
.tab:hover:not(.active){color:var(--navy-light)}
.content{padding:16px 24px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--white);border-radius:6px;padding:14px;border-left:3px solid var(--navy)}
.kpi.wine{border-left-color:var(--wine)}
.kpi.dark{border-left-color:var(--gray-900)}
.kpi.green{border-left-color:var(--green)}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-bottom:4px;font-weight:600}
.kpi .value{font-size:20px;font-weight:700;color:var(--gray-900)}
.kpi .sub{font-size:11px;color:var(--gray-500);margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:16px}
.card{background:var(--white);border-radius:6px;padding:14px}
.card h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;border-bottom:2px solid #dde3e8;font-weight:700;color:var(--navy);font-size:10px;text-transform:uppercase}
td{padding:5px 8px;border-bottom:1px solid var(--gray-100)}
tr:hover td{background:var(--navy-pale)}
.text-right{text-align:right}
.text-center{text-align:center}
.neg{color:var(--wine)}
.pos{color:var(--green)}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.badge-ok{background:#e1f5e8;color:var(--green)}
.badge-warn{background:#fff3e0;color:var(--orange)}
.badge-bad{background:var(--wine-pale);color:var(--wine)}
.chart-container{position:relative;height:220px}
.chart-sm{height:180px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>

let state={regional:'todas',modalidade:'todas',tab:'pipeline'};
let charts={};

function fmt(v){
  if(v>=1e6) return 'R$'+(v/1e6).toFixed(1).replace('.',',')+'M';
  if(v>=1e3) return 'R$'+(v/1e3).toFixed(0)+'K';
  return 'R$'+v.toLocaleString('pt-BR');
}
function fmtFull(v){return 'R$'+v.toLocaleString('pt-BR',{minimumFractionDigits:0})}

function calcTotals(pData){
  const stages=['proposta','credito','juridico','assinatura','conferencia','pendencia','finalizado'];
  const tot={};stages.forEach(s=>{tot[s]={v:0,q:0}});
  Object.values(pData).forEach(reg=>{stages.forEach(s=>{tot[s].v+=reg[s].v;tot[s].q+=reg[s].q})});
  return tot;
}

function setFilter(type,btn,val){
  state[type]=val;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}
function switchTab(el,tab){
  state.tab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');render();
}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}

  const totalQTD=stages.reduce((s,st)=>s+tot[st].q,0);
  const finVGV=tot.finalizado.v;const finQTD=tot.finalizado.q;
  const andVGV=totalVGV-finVGV;const andQTD=totalQTD-finQTD;
  const el=document.getElementById('main-content');

  const barColors=['#E8F0F6','#C5D9E8','#8FB8D4','#5A96BC','#2E78A4','#0A5A8C','#003D6B'];

            const rTot=stages.reduce((s,st)=>s+d[st].v,0);
            const rQtd=stages.reduce((s,st)=>s+d[st].q,0);
            return '<tr><td><strong>'+reg+'</strong></td>'+stages.map(st=>'<td class="text-right">'+(d[st].v?fmt(d[st].v):'—')+'<br><span style="color:var(--gray-300);font-size:10px">'+(d[st].q||'')+'</span></td>').join('')+'<td class="text-right"><strong>'+fmt(rTot)+'</strong><br><span style="color:var(--gray-300);font-size:10px">'+rQtd+'</span></td></tr>';
          }).join(''))+'\n          <tr style="font-weight:700;border-top:2px solid var(--navy)"><td>Total</td>'+(stages.map(st=>'<td class="text-right">'+(tot[st].v?fmt(tot[st].v):'—')+'<br><span style="color:var(--gray-300);font-size:10px">'+(tot[st].q||'')+'</span></td>').join(''))+'<td class="text-right">'+(fmt(totalVGV))+'<br><span style="color:var(--gray-300);font-size:10px">'+(totalQTD)+'</span></td></tr>\n        </table>\n      </div>';

    const ctx1=document.getElementById('ch-pipeline');
    if(ctx1){charts.pipeline=new Chart(ctx1,{type:'bar',data:{labels:stageLabels,datasets:[{data:stages.map(s=>tot[s].v),backgroundColor:barColors,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>fmtFull(i.raw)}}},scales:{y:{ticks:{callback:v=>fmt(v)},grid:{color:'#eef2f6'}},x:{grid:{display:false}}}}})}

    const ctx2=document.getElementById('ch-dist');
    if(ctx2){charts.dist=new Chart(ctx2,{type:'doughnut',data:{labels:stageLabels,datasets:[{data:stages.map(s=>tot[s].v),backgroundColor:barColors}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:i=>fmtFull(i.raw)}}}}})}

  } else if(state.tab==='metas'){
    const metas=METAS[state.modalidade]?.[state.regional]||[];
    const totalProj=metas.reduce((s,m)=>s+m.proj,0);
    const totalFin=metas.reduce((s,m)=>s+m.fin,0);
    const totalQP=metas.reduce((s,m)=>s+m.qtdP,0);
    const totalQR=metas.reduce((s,m)=>s+m.qtdR,0);
    const totalDesvP=totalProj?((totalFin-totalProj)/totalProj*100):0;

    el.innerHTML='\n      <div class="kpis">\n        <div class="kpi"><div class="label">VGV Projetado</div><div class="value">'+(fmt(totalProj))+'</div><div class="sub">'+(fmtFull(totalProj))+'</div></div>\n        <div class="kpi dark"><div class="label">VGV Finalizado</div><div class="value">'+(fmt(totalFin))+'</div><div class="sub">'+(fmtFull(totalFin))+'</div></div>\n        <div class="kpi wine"><div class="label">Desvio VGV</div><div class="value neg">'+(totalDesvP.toFixed(1))+'%</div><div class="sub">'+(fmtFull(Math.abs(totalFin-totalProj)))+' abaixo</div></div>\n        <div class="kpi green"><div class="label">Atingimento QTD</div><div class="value">'+(totalQP?((totalQR/totalQP)*100).toFixed(0):0)+'%</div><div class="sub">'+(totalQR)+' de '+(totalQP)+'</div></div>\n      </div>\n      <div class="grid2">\n        <div class="card"><h3>Projetado vs Finalizado por Diretor</h3><div class="chart-container"><canvas id="ch-metas"></canvas></div></div>\n        <div class="card"><h3>Atingimento da Meta</h3><div class="chart-container"><canvas id="ch-ating"></canvas></div></div>\n      </div>\n      <div class="card"><h3>Detalhamento de Metas</h3>\n        <table>\n          <tr><th>Diretor</th><th class="text-right">VGV Projetado</th><th class="text-right">VGV Finalizado</th><th class="text-right">Desvio %</th><th class="text-center">QTD Proj.</th><th class="text-center">QTD Real.</th><th class="text-right">Desvio QTD</th><th class="text-center">Status</th></tr>\n          '+(metas.map(m=>{
            const pct=m.proj?((m.fin/m.proj)*100).toFixed(0):0;
            const badge=pct>=80?'badge-ok':pct>=50?'badge-warn':'badge-bad';
            const label=pct>=80?'Na Meta':pct>=50?'Atenção':'Abaixo';
            return '<tr><td><strong>'+m.dir+'</strong></td><td class="text-right">'+fmtFull(m.proj)+'</td><td class="text-right">'+fmtFull(m.fin)+'</td><td class="text-right neg">'+m.desvP+'%</td><td class="text-center">'+m.qtdP+'</td><td class="text-center">'+m.qtdR+'</td><td class="text-right neg">'+m.desvQ.toFixed(1)+'%</td><td class="text-center"><span class="badge '+badge+'">'+label+' '+pct+'%</span></td></tr>';
          }).join(''))+'\n          <tr style="font-weight:700;border-top:2px solid var(--navy)"><td>Total</td><td class="text-right">'+(fmtFull(totalProj))+'</td><td class="text-right">'+(fmtFull(totalFin))+'</td><td class="text-right neg">'+(totalDesvP.toFixed(1))+'%</td><td class="text-center">'+(totalQP)+'</td><td class="text-center">'+(totalQR)+'</td><td class="text-right neg">'+(totalQP?((totalQR-totalQP)/totalQP*100).toFixed(1):0)+'%</td><td class="text-center"><span class="badge badge-bad">Abaixo '+(totalProj?((totalFin/totalProj)*100).toFixed(0):0)+'%</span></td></tr>\n        </table>\n      </div>';

    const ctx3=document.getElementById('ch-metas');
    if(ctx3){charts.metas=new Chart(ctx3,{type:'bar',data:{labels:metas.map(m=>m.dir),datasets:[{label:'Projetado',data:metas.map(m=>m.proj),backgroundColor:'#C5D9E8',borderRadius:3},{label:'Finalizado',data:metas.map(m=>m.fin),backgroundColor:'#003D6B',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:i=>i.dataset.label+': '+fmtFull(i.raw)}}},scales:{y:{ticks:{callback:v=>fmt(v)},grid:{color:'#eef2f6'}},x:{grid:{display:false}}}}})}

    const ctx4=document.getElementById('ch-ating');
    if(ctx4){const pctVal=totalProj?((totalFin/totalProj)*100):0;charts.ating=new Chart(ctx4,{type:'doughnut',data:{labels:['Atingido','Restante'],datasets:[{data:[Math.min(pctVal,100),Math.max(100-pctVal,0)],backgroundColor:['#003D6B','#E8F0F6']}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>i.label+': '+i.raw.toFixed(1)+'%'}}}}})}

  } else if(state.tab==='empreendimentos'){
    const emps=EMPREENDIMENTOS[state.modalidade]||EMPREENDIMENTOS.todas;
    const sorted=[...emps].sort((a,b)=>b.desvP-a.desvP);
    const top5=sorted.slice(0,5);

    el.innerHTML='\n      <div class="grid2" style="margin-bottom:16px">\n        <div class="card"><h3>Top 5 Empreendimentos (Melhor Atingimento)</h3><div class="chart-container chart-sm"><canvas id="ch-top5"></canvas></div></div>\n        <div class="card"><h3>Atingimento por Empreendimento</h3><div class="chart-container chart-sm"><canvas id="ch-empbar"></canvas></div></div>\n      </div>\n      <div class="card"><h3>Todos os Empreendimentos</h3>\n        <table>\n          <tr><th>Empreendimento</th><th class="text-right">VGV Projetado</th><th class="text-right">VGV Finalizado</th><th class="text-right">Desvio %</th><th class="text-center">QTD Proj.</th><th class="text-center">QTD Real.</th><th class="text-center">Status</th></tr>\n          '+(sorted.map(e=>{
            const badge=e.desvP>=0?'badge-ok':e.desvP>=-30?'badge-warn':'badge-bad';
            const label=e.desvP>=0?'Ok':e.desvP>=-30?'Atenção':'Abaixo';
            return '<tr><td><strong>'+e.n+'</strong></td><td class="text-right">'+fmtFull(e.proj)+'</td><td class="text-right">'+fmtFull(e.fin)+'</td><td class="text-right '+(e.desvP>=0?'pos':'neg')+'">'+(e.desvP>0?'+':'')+e.desvP+'%</td><td class="text-center">'+e.qtdP+'</td><td class="text-center">'+e.qtdR+'</td><td class="text-center"><span class="badge '+badge+'">'+label+'</span></td></tr>';
          }).join(''))+'\n        </table>\n      </div>';

    const ctx5=document.getElementById('ch-top5');
    if(ctx5){charts.top5=new Chart(ctx5,{type:'bar',data:{labels:top5.map(e=>e.n.length>20?e.n.substring(0,20)+'…':e.n),datasets:[{data:top5.map(e=>e.fin),backgroundColor:'#003D6B',borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>fmtFull(i.raw)}}},scales:{x:{ticks:{callback:v=>fmt(v)},grid:{color:'#eef2f6'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}})}

    const ctx6=document.getElementById('ch-empbar');
    if(ctx6){const s=sorted.slice(0,10);charts.empbar=new Chart(ctx6,{type:'bar',data:{labels:s.map(e=>e.n.length>15?e.n.substring(0,15)+'…':e.n),datasets:[{data:s.map(e=>e.proj?(e.fin/e.proj*100):0),backgroundColor:s.map(e=>e.desvP>=0?'#1B8C4F':e.desvP>=-30?'#D4760A':'#A4001B'),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>i.raw.toFixed(1)+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'#eef2f6'},suggestedMax:150},x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}}}}})}
  }
}
render();
</script>
</body>
</html>
